<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centurion</title>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <!-- Prism.js -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    
    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --bg-color: #F8F9FA;
            --text-color: #001F3F;
            --border-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.8;
            font-size: 18px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        header {
            text-align: center;
            padding: 4rem 0 3rem;
            border-bottom: 1px solid rgba(0, 31, 63, 0.1);
            margin-bottom: 3rem;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: rgba(0, 31, 63, 0.6);
            font-size: 1.1rem;
            font-style: italic;
        }
        
        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }
        
        .nav-item {
            padding: 0.5rem 1.5rem;
            background: transparent;
            border: 1px solid rgba(0, 31, 63, 0.2);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-size: 1rem;
            color: var(--text-color);
            font-family: inherit;
        }
        
        .nav-item:hover {
            background: rgba(0, 31, 63, 0.05);
            transform: translateY(-2px);
        }
        
        .nav-item.active {
            background: var(--text-color);
            color: var(--bg-color);
        }
        
        #tags-container {
            margin-bottom: 3rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }
        
        .tag {
            padding: 0.25rem 0.75rem;
            background: transparent;
            border: 1px solid rgba(0, 31, 63, 0.15);
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .tag:hover, .tag.active {
            background: var(--text-color);
            color: var(--bg-color);
        }
        
        #articles-list {
            display: grid;
            gap: 2rem;
        }
        
        .article-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0, 31, 63, 0.05);
            transition: var(--transition);
            cursor: pointer;
        }
        
        .article-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 31, 63, 0.1);
        }
        
        .article-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 400;
        }
        
        .article-meta {
            color: rgba(0, 31, 63, 0.5);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            font-style: italic;
        }
        
        .article-excerpt {
            color: rgba(0, 31, 63, 0.8);
            line-height: 1.6;
        }
        
        .article-tags {
            margin-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .article-tag {
            font-size: 0.8rem;
            color: rgba(0, 31, 63, 0.6);
            background: rgba(0, 31, 63, 0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
        }
        
        #article-view {
            background: white;
            border-radius: var(--border-radius);
            padding: 3rem;
            box-shadow: 0 2px 8px rgba(0, 31, 63, 0.05);
            display: none;
        }
        
        .back-button {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.95rem;
            opacity: 0.7;
            transition: var(--transition);
        }
        
        .back-button:hover {
            opacity: 1;
            transform: translateX(-4px);
        }
        
        #article-content {
            font-size: 1.1rem;
        }
        
        #article-content h1 {
            font-size: 2.2rem;
            margin: 2rem 0 1rem;
            font-weight: 400;
        }
        
        #article-content h2 {
            font-size: 1.8rem;
            margin: 2rem 0 1rem;
            font-weight: 400;
            color: rgba(0, 31, 63, 0.9);
        }
        
        #article-content h3 {
            font-size: 1.4rem;
            margin: 1.5rem 0 0.75rem;
            font-weight: 400;
            color: rgba(0, 31, 63, 0.85);
        }
        
        #article-content p {
            margin-bottom: 1.5rem;
            text-align: justify;
        }
        
        #article-content pre {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            overflow-x: auto;
        }
        
        #article-content code:not([class*="language-"]) {
            background: rgba(0, 31, 63, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        #article-content blockquote {
            border-left: 3px solid var(--text-color);
            margin: 1.5rem 0;
            padding-left: 1.5rem;
            font-style: italic;
            color: rgba(0, 31, 63, 0.8);
        }
        
        #article-content ul, #article-content ol {
            margin: 1rem 0 1.5rem 2rem;
        }
        
        #article-content li {
            margin-bottom: 0.5rem;
        }
        
        #article-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1.5rem 0;
        }
        
        .katex-display {
            margin: 1.5rem 0;
            overflow-x: auto;
            padding: 1rem;
        }
        
        @media (max-width: 768px) {
            body {
                font-size: 16px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            nav {
                gap: 1rem;
            }
            
            .nav-item {
                padding: 0.4rem 1rem;
                font-size: 0.9rem;
            }
            
            #article-view {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Centurion</h1>
            <p class="subtitle">Bâtir dans le silence, conquérir par la science. Le registre de bord du Centurion.</p>
        </header>
        
        <nav>
            <button class="nav-item active" data-category="all">Tout</button>
            <button class="nav-item" data-category="mathematiques">Mathématiques</button>
            <button class="nav-item" data-category="informatique">Informatique</button>
            <button class="nav-item" data-category="finance">Finance</button>
        </nav>
        
        <div id="tags-container"></div>
        
        <main>
            <div id="articles-list"></div>
            <div id="article-view">
                <a href="#" class="back-button" onclick="showArticlesList(); return false;">← Retour aux articles</a>
                <article id="article-content"></article>
            </div>
        </main>
    </div>
    
    <script>
        let articles = [];
        let currentCategory = 'all';
        let currentTag = null;
        
        // Configuration Marked.js
        marked.setOptions({
            highlight: function(code, lang) {
                if (Prism.languages[lang]) {
                    return Prism.highlight(code, Prism.languages[lang], lang);
                }
                return code;
            },
            breaks: true,
            gfm: true
        });
        
        // Chargement des articles
        async function loadArticles() {
            try {
                const response = await fetch('articles/list.json');
                articles = await response.json();
                renderArticlesList();
                renderTags();
            } catch (error) {
                console.error('Erreur lors du chargement des articles:', error);
            }
        }
        
        // Rendu de la liste des articles
        function renderArticlesList() {
            const container = document.getElementById('articles-list');
            let filteredArticles = articles;
            
            if (currentCategory !== 'all') {
                filteredArticles = filteredArticles.filter(a => a.category === currentCategory);
            }
            
            if (currentTag) {
                filteredArticles = filteredArticles.filter(a => a.tags.includes(currentTag));
            }
            
            container.innerHTML = filteredArticles.map(article => `
                <div class="article-card" onclick="loadArticle('${article.file}')">
                    <h2 class="article-title">${article.title}</h2>
                    <div class="article-meta">${formatDate(article.date)} • ${article.readTime}</div>
                    <p class="article-excerpt">${article.excerpt}</p>
                    <div class="article-tags">
                        ${article.tags.map(tag => `<span class="article-tag">#${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // Rendu des tags
        function renderTags() {
            const allTags = [...new Set(articles.flatMap(a => a.tags))];
            const container = document.getElementById('tags-container');
            
            container.innerHTML = allTags.map(tag => `
                <span class="tag" onclick="filterByTag('${tag}')">#${tag}</span>
            `).join('');
        }
        
        // Filtrage par tag
        function filterByTag(tag) {
            currentTag = currentTag === tag ? null : tag;
            document.querySelectorAll('.tag').forEach(el => {
                el.classList.toggle('active', el.textContent === `#${tag}` && currentTag === tag);
            });
            renderArticlesList();
        }
        
        // Navigation par catégorie
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.category;
                    currentTag = null;
                    document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
                    renderArticlesList();
                });
            });
            
            loadArticles();
        });
        
        // Chargement d'un article
        async function loadArticle(filename) {
            try {
                const response = await fetch(`articles/${filename}`);
                const markdown = await response.text();
                const html = marked.parse(markdown);
                
                document.getElementById('articles-list').style.display = 'none';
                document.getElementById('tags-container').style.display = 'none';
                document.getElementById('article-view').style.display = 'block';
                document.getElementById('article-content').innerHTML = html;
                
                // Rendu KaTeX
                renderMathInElement(document.getElementById('article-content'), {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\[', right: '\\]', display: true},
                        {left: '\\(', right: '\\)', display: false}
                    ],
                    throwOnError: false
                });
                
                // Recoloration syntaxique
                Prism.highlightAllUnder(document.getElementById('article-content'));
                
                window.scrollTo(0, 0);
            } catch (error) {
                console.error('Erreur lors du chargement de l\'article:', error);
            }
        }
        
        // Retour à la liste
        function showArticlesList() {
            document.getElementById('article-view').style.display = 'none';
            document.getElementById('articles-list').style.display = 'grid';
            document.getElementById('tags-container').style.display = 'flex';
        }
        
        // Formatage de date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return date.toLocaleDateString('fr-FR', options);
        }
    </script>
</body>
</html>
